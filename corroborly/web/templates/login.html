<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Corroborly — Sign in</title>
<link rel="stylesheet" href="/static/styles.css">
<script src="/static/theme.js"></script>
</head>
<body class="login-body">
<details id="theme-menu" class="theme-menu login-theme-menu">
  <summary class="secondary theme-menu-summary"><span class="theme-menu-label">Theme: System</span></summary>
  <div class="theme-menu-panel">
    <button type="button" class="theme-option" data-theme-value="light">Light</button>
    <button type="button" class="theme-option" data-theme-value="dark">Dark</button>
    <button type="button" class="theme-option" data-theme-value="system">System</button>
  </div>
</details>
<main class="login-card">
  <h1>Corroborly</h1>
  <p class="muted">Local-first, evidence-first research workspace.</p>
  <form id="login-form" autocomplete="off">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required autofocus autocomplete="username">
    <label for="password">Password</label>
    <div class="password-field">
      <input type="password" id="password" name="password" required autocomplete="current-password">
      <button type="button" id="password-visibility-btn" class="secondary" tabindex="-1" title="Show password">Show</button>
    </div>
    <label class="remember-me-label">
      <input type="checkbox" id="remember-me-checkbox"> Remember me for 30 days
    </label>
    <button type="submit">Sign in</button>
    <p id="login-error" class="error" hidden></p>
  </form>
</main>
<script>
  setupThemeMenu("theme-menu");

  const passwordInput = document.getElementById("password");
  const passwordVisibilityBtn = document.getElementById("password-visibility-btn");
  passwordVisibilityBtn.addEventListener("click", () => {
    const showing = passwordInput.type === "text";
    passwordInput.type = showing ? "password" : "text";
    passwordVisibilityBtn.textContent = showing ? "Show" : "Hide";
    passwordVisibilityBtn.title = showing ? "Show password" : "Hide password";
  });

  const nextUrl = {{ next | tojson }};
  const form = document.getElementById("login-form");
  const errorEl = document.getElementById("login-error");
  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    errorEl.hidden = true;
    const username = document.getElementById("username").value;
    const password = passwordInput.value;
    const remember = document.getElementById("remember-me-checkbox").checked;
    try {
      const response = await fetch("/api/v1/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ username, password, remember }),
      });
      const body = await response.json();
      if (!response.ok || !body.ok) {
        const message = (body.errors && body.errors[0] && body.errors[0].message) || "Sign in failed.";
        errorEl.textContent = message;
        errorEl.hidden = false;
        return;
      }
      window.location.href = nextUrl || "/";
    } catch (err) {
      errorEl.textContent = "Could not reach the server.";
      errorEl.hidden = false;
    }
  });
</script>
</body>
</html>
